<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Wheelview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-container: #161b22;
            --bg-input: #0d1117;
            --text-main: #c9d1d9;
            --text-title: #ffffff;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --btn-primary: #1f6feb;
            --btn-primary-hover: #388bfd;
            --btn-secondary: #21262d;
            --card-bg: #161b22;
        }

        body.light-mode {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-input: #f8f9fa;
            --text-main: #24292f;
            --text-title: #1b1f24;
            --text-muted: #57606a;
            --border-color: #d0d7de;
            --accent-blue: #0969da;
            --btn-primary: #0969da;
            --btn-primary-hover: #1a7fef;
            --btn-secondary: #eff2f5;
            --card-bg: #f6f8fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--bg-container);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        main {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            flex-grow: 1;
        }

        .container {
            background-color: var(--bg-container);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            gap: 40px;
            border: 1px solid var(--border-color);
        }

        .column-left, .column-right { flex: 1; display: flex; flex-direction: column; }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border-radius: 8px;
            background-color: var(--bg-input);
            color: var(--text-main);
            font-family: monospace;
        }

        .actions-group { margin-top: 25px; display: flex; gap: 10px; }

        .action-btn {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .primary { background-color: var(--btn-primary); color: white; }
        .secondary { background-color: var(--btn-secondary); color: var(--text-main); }

        .results-display {
            background-color: var(--bg-input);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .stat-card {
            background-color: var(--bg-container);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        .ok-text { color: #56d364; }
        .nok-text { color: #f85149; }

        /* 🔹 NOVO BLOCO DE INSTRUÇÕES */
        .instructions-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background-color: var(--bg-container);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .instructions-box h3 {
            margin-top: 0;
            color: var(--accent-blue);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .instructions-box p {
            margin: 6px 0;
        }

    </style>
</head>
<body>

<header>
    <h1>Análise de Wheelview</h1>
    <button class="theme-toggle" id="themeBtn">
        <i class="fas fa-sun"></i> Alternar Tema
    </button>
</header>

<main>
    <div class="container">
        <div class="column-left">
            <h2>Dados da Leitura</h2>
            <textarea id="dataInput"></textarea>
            <div class="actions-group">
                <button class="action-btn primary" onclick="processarTexto()">Analisar</button>
                <button class="action-btn secondary" onclick="limpar()">Limpar</button>
            </div>
        </div>

        <div class="column-right">
            <h2>Resultados</h2>

            <div class="results-display" id="resultsArea">
                <div class="stat-card">
                    <span>Total Processado</span>
                    <span id="valTotal">0</span>
                </div>

                <div class="stat-card">
                    <span>Leituras OK</span>
                    <span class="ok-text" id="valOk">0</span>
                </div>

                <div class="stat-card">
                    <span>Leituras NOK</span>
                    <span class="nok-text" id="valNok">0</span>
                </div>

                <!-- 🔹 INSTRUÇÕES -->
                <div class="instructions-box">
                    <h3>Como usar no banco de dados</h3>
                    <p><strong>Medições OK:</strong> utilizar o valor de <b>Total Processado</b></p>
                    <p><strong>Medições NOK:</strong> utilizar o valor de <b>Leituras NOK</b></p>
                    <p><strong>Porcentagem:</strong> utilizar a porcentagem de <b>Leituras OK</b></p>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
function processarTexto() {
    const text = document.getElementById('dataInput').value;
    const lines = text.split('\n');
    let total = 0, ok = 0, nok = 0;

    lines.forEach(line => {
        const cols = line.split(',');
        if (cols.length > 21) {
            const status = cols[21].trim();
            if (status === '0') { ok++; total++; }
            else if (status === '1') { nok++; total++; }
        }
    });

    if (total > 0) {
        document.getElementById('valTotal').innerText = total;
        document.getElementById('valOk').innerText = `${ok} (${((ok/total)*100).toFixed(2)}%)`;
        document.getElementById('valNok').innerText = `${nok} (${((nok/total)*100).toFixed(2)}%)`;
        document.getElementById('resultsArea').style.display = 'block';
    } else {
        alert("Nenhum dado válido encontrado.");
    }
}

function limpar() {
    document.getElementById('dataInput').value = '';
    document.getElementById('resultsArea').style.display = 'none';
}
</script>

</body>
</html>
